name: Code quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: 'package.json'
      - name: Install dependencies
        run: bun install
      - name: Lint check
        run: bun run lint:check
      - name: Type check
        run: bun run typecheck
      # The Biome plugin at scripts/biome/c-json-errors.grit rejects ad-hoc
      # c.json({ ... }, 4xx/5xx) error literals as part of `bun run lint:check`
      # above; no separate step is needed. See
      # specs/20260524T100110-centralize-c-json-error-responses.md.
