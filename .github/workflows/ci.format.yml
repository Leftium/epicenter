name: Code quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: 'package.json'
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint check
        run: bun run lint:check
      - name: Type check
        run: bun run typecheck
      - name: Reject ad-hoc c.json error literals
        # Every non-2xx response must come from a defineErrors variant in
        # packages/constants/src/<domain>-errors.ts. See
        # specs/20260524T100110-centralize-c-json-error-responses.md.
        run: |
          if grep -rEn --exclude-dir=.wrangler --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.next "c\.json\(\s*\{\s*name:\s*['\"]" packages apps; then
            echo "::error::Found ad-hoc c.json({ name: ... }) literal. Use a defineErrors variant from @epicenter/constants/<domain>-errors.ts instead."
            exit 1
          fi
