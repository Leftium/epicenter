name: Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/whispering/**'
      - 'apps/landing/**'
      - 'packages/**'
      - '.github/workflows/deploy.preview.yml'

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  preview:
    name: Deploy Previews
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: 'package.json'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all
        run: bun run build
        env:
          NODE_ENV: production

      - name: Upload Whispering preview
        id: whispering
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/whispering
          packageManager: bun
          command: versions upload --preview-alias "pr-${{ github.event.pull_request.number }}" --tag "pr-${{ github.event.pull_request.number }}" --message "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"

      - name: Upload Landing preview
        id: landing
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/landing
          packageManager: bun
          command: versions upload --preview-alias "pr-${{ github.event.pull_request.number }}" --tag "pr-${{ github.event.pull_request.number }}" --message "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const whisperingUrl = '${{ steps.whispering.outputs.deployment-url }}';
            const landingUrl = '${{ steps.landing.outputs.deployment-url }}';

            const comment = `## Preview Deployment

            | App | Preview URL |
            |-----|-------------|
            | Whispering | ${whisperingUrl} |
            | Landing | ${landingUrl} |

            These previews update automatically with new commits to this PR.
            No cleanup needed — previews are version aliases on the existing workers.

            ---
            <sub>Commit ${context.sha.substring(0, 7)}</sub>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Deployment')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
