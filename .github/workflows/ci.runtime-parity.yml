# Runtime-parity regression gate for the apps/api runtime port (ADR-0059).
#
# Boots the Bun runtime port (apps/api/server.dev.ts) against plain Postgres and
# a real S3 (versitygw, the same store dev uses), then runs the one-scenario
# smoke (apps/api/scripts/smoke.ts) end to end: health, session, open+read a
# room, and the full content-addressed blob lifecycle. A non-zero smoke exit
# fails the job.
#
# No real secrets, OAuth, or JWKS are needed: the server runs with the dev
# resolver (server.dev.ts), which resolves `Authorization: Bearer dev:<userId>`
# to a synthetic user on localhost. The Google and Better-Auth env vars are
# present only because boot validates them as strings; the dev path never
# exercises them, so they are obvious throwaways.
#
# Scope: this proves LOGIC parity (the same Hono app over injected runtime
# hooks). It does NOT prove TRANSPORT parity: `Bun.serve` vs workerd, and the
# WebSocket upgrade path, only differ under wrangler. Catching that skew needs
# `wrangler dev` against real Cloudflare bindings, which stays a manual / staging
# step (it needs Infisical secrets this gate deliberately avoids).

name: Runtime parity

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  bun-smoke:
    # GitHub-hosted runner: this job needs Docker Compose v2 and the AWS CLI
    # (both preinstalled here) plus a Postgres service container. It can move to
    # the repo's Blacksmith runner if that image carries the same tools.
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: epicenter
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/epicenter
      # Required by boot validation as strings; the dev resolver bypasses them,
      # so these are deliberately fake and never reach Google or JWKS.
      BETTER_AUTH_SECRET: ci-runtime-parity-not-a-real-secret
      GOOGLE_CLIENT_ID: ci-not-a-real-client-id
      GOOGLE_CLIENT_SECRET: ci-not-a-real-client-secret
      # Point the portable S3 client at the local versitygw store (below).
      BLOBS_S3_ENDPOINT: http://localhost:7070
      BLOBS_S3_ACCESS_KEY_ID: epicenter-local
      BLOBS_S3_SECRET_ACCESS_KEY: epicenter-local-secret
      BLOBS_S3_BUCKET: epicenter-blobs
      BLOBS_S3_REGION: us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: 'package.json'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply database schema
        # The server boots without a schema (the room telemetry upsert is
        # fire-and-forget), but applying the committed migration keeps the gate
        # honest and quiet. Drizzle reads DATABASE_URL from the job env.
        working-directory: apps/api
        run: bun x drizzle-kit migrate

      - name: Start local S3 (versitygw) and create the bucket
        # Reuses the exact compose file dev and self-host use, so the CI store is
        # the same artifact (versitygw over a folder) and the bucket-creation
        # one-shot runs unchanged. Poll until the bucket exists before the smoke,
        # because the blob store never calls CreateBucket.
        working-directory: apps/api
        env:
          AWS_ACCESS_KEY_ID: epicenter-local
          AWS_SECRET_ACCESS_KEY: epicenter-local-secret
          AWS_DEFAULT_REGION: us-east-1
        run: |
          docker compose up -d
          for i in $(seq 1 30); do
            if aws --endpoint-url http://localhost:7070 s3 ls s3://epicenter-blobs >/dev/null 2>&1; then
              echo "versitygw ready, bucket epicenter-blobs exists"
              exit 0
            fi
            echo "waiting for versitygw + bucket ($i)..."
            sleep 2
          done
          echo "::error::versitygw / bucket not ready after 60s"
          docker compose logs
          exit 1

      - name: Run runtime-parity smoke (Bun)
        # Boot the Bun port with the dev resolver, wait for health, run the one
        # scenario, and propagate its exit code. The server log is dumped on any
        # failure so a red gate is diagnosable from the run alone.
        run: |
          bun apps/api/server.dev.ts > /tmp/bun-server.log 2>&1 &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8788/ >/dev/null 2>&1; then
              ready=1
              break
            fi
            echo "waiting for Bun server ($i)..."
            sleep 1
          done
          if [ -z "$ready" ]; then
            echo "::error::Bun server did not become ready"
            cat /tmp/bun-server.log
            kill "$SERVER_PID" 2>/dev/null || true
            exit 1
          fi
          set +e
          bun apps/api/scripts/smoke.ts http://localhost:8788
          code=$?
          set -e
          kill "$SERVER_PID" 2>/dev/null || true
          if [ "$code" -ne 0 ]; then
            echo "::error::Runtime-parity smoke failed (exit $code)"
            echo "----- Bun server log -----"
            cat /tmp/bun-server.log
          fi
          exit $code

      - name: Stop local S3
        if: always()
        working-directory: apps/api
        run: docker compose down -v
